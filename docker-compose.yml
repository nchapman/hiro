services:
  hiro:
    image: ghcr.io/nchapman/hiro:latest
    restart: unless-stopped
    init: true
    ports:
      - "8120:8120"
    volumes:
      - hiro:/hiro
      # Expose host directories to agents by bind-mounting them under
      # /hiro/mounts/<name>. Add `:ro` for read-only access.
      # Example:
      #   - /Users/you/Photos:/hiro/mounts/photos:ro
      #   - /Users/you/scratch:/hiro/mounts/scratch
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup

volumes:
  hiro:

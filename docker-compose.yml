services:
  hiro:
    build: .
    image: hiro:latest
    restart: unless-stopped
    init: true
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    volumes:
      - hiro:/hiro
    environment:
      - HIRO_ADDR=:8080
      - HIRO_ROOT=/hiro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s

# WARNING: 'docker compose down -v' destroys all agent state (history, memory, todos).
volumes:
  hiro:

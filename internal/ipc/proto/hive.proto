syntax = "proto3";

package hive;

option go_package = "github.com/nchapman/hivebot/internal/ipc/proto";

// AgentWorker is served by each agent worker process. The control plane
// calls these RPCs to execute tools and manage the worker's lifecycle.
service AgentWorker {
  // ExecuteTool runs a single tool in the worker's sandbox and returns the result.
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);

  // Shutdown gracefully stops the agent worker process.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

message ExecuteToolRequest {
  string name = 1;              // tool name (bash, read_file, etc.)
  string input = 2;             // JSON-encoded tool arguments
  string call_id = 3;           // tool call ID from the LLM
  repeated string secret_env = 4; // secret env vars for bash (KEY=VALUE pairs)
}

message ExecuteToolResponse {
  string content = 1;
  bool is_error = 2;
}

message ShutdownRequest {}

message ShutdownResponse {}

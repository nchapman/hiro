# Cluster e2e test — run with: make test-cluster
# Starts a leader and worker node, verifies clustering end-to-end.
# The worker connects and waits for approval; the test approves it via API.
services:
  leader:
    build: .
    init: true
    cap_add:
      - NET_ADMIN
    ports:
      - "0:8080"  # HTTP API (random host port)
      - "0:8081"  # Cluster gRPC (random host port)
    environment:
      - HIRO_ADDR=:8080
      - HIRO_CLUSTER_ADDR=:8081
      - HIRO_ROOT=/hiro
    volumes:
      - leader-hiro:/hiro
      - ./tests/e2e_cluster/leader-config/config.yaml:/hiro/config/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      start_period: 5s

  worker:
    build: .
    init: true
    cap_add:
      - NET_ADMIN
    depends_on:
      leader:
        condition: service_healthy
    environment:
      - HIRO_ROOT=/hiro
      - HIRO_MODE=worker
      - HIRO_LEADER=leader:8081
    volumes:
      - worker-hiro:/hiro

volumes:
  leader-hiro:
  worker-hiro:

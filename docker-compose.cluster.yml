# Cluster e2e test — run with: make test-cluster
# Starts a leader and worker node, verifies clustering end-to-end.
#
# HIRO_JOIN_TOKEN must be set in the environment before `docker compose up`.
# The Makefile generates it with `openssl rand -hex 32`.
services:
  leader:
    build: .
    init: true
    ports:
      - "0:8080"  # HTTP API (random host port)
      - "0:8081"  # Cluster gRPC (random host port)
    environment:
      - HIRO_ADDR=:8080
      - HIRO_CLUSTER_ADDR=:8081
      - HIRO_ROOT=/hiro
    volumes:
      - leader-hiro:/hiro
      - ./tests/e2e_cluster/leader-config.yaml:/hiro/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      start_period: 5s

  worker:
    build: .
    init: true
    depends_on:
      leader:
        condition: service_healthy
    environment:
      - HIRO_ROOT=/hiro
      - HIRO_MODE=worker
      - HIRO_LEADER=leader:8081
      - HIRO_JOIN_TOKEN=${HIRO_JOIN_TOKEN}
    volumes:
      - worker-hiro:/hiro

volumes:
  leader-hiro:
  worker-hiro:

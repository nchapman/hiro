# E2E test — run with: make test-online
services:
  hiro-e2e:
    build: ..
    ports:
      - "0:8120" # random host port to avoid conflicts
    volumes:
      - e2e-hiro:/home/hiro
    init: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8120/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s

volumes:
  e2e-hiro:

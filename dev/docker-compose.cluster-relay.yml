# Cluster relay e2e test — run with: make test-cluster-relay
# Leader and worker are on SEPARATE Docker networks so they cannot
# reach each other directly. Both have internet access to reach the
# live tracker (discover.hellohiro.ai) and relay (relay.hellohiro.ai).
# The leader self-tests, finds itself unreachable, connects to the relay.
# The worker discovers the leader via tracker, direct fails, falls back
# to relay. All gRPC traffic flows through the relay with mTLS end-to-end.
services:
  leader:
    build: ..
    init: true
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp=../seccomp.json
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - leader-net
    ports:
      - "0:8080"  # HTTP API for test harness (host access only)
    environment:
      - HIRO_ADDR=:8080
      - HIRO_CLUSTER_ADDR=:8081
      - HIRO_ROOT=/hiro
      - HIRO_TRACKER_URL=https://discover.hellohiro.ai
      - HIRO_SWARM_CODE=${HIRO_SWARM_CODE}
    volumes:
      - leader-hiro:/hiro
      - ../tests/e2e_cluster/leader-config/config.yaml:/hiro/config/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      start_period: 5s

  worker:
    build: ..
    init: true
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp=../seccomp.json
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - worker-net  # separate network — no direct path to leader
    depends_on:
      leader:
        condition: service_healthy
    environment:
      - HIRO_ROOT=/hiro
      - HIRO_MODE=worker
      - HIRO_TRACKER_URL=https://discover.hellohiro.ai
      - HIRO_SWARM_CODE=${HIRO_SWARM_CODE}
      # No HIRO_LEADER — discovers via tracker, connects via relay
    volumes:
      - worker-hiro:/hiro

networks:
  leader-net:
  worker-net:

volumes:
  leader-hiro:
  worker-hiro:

# Dev cluster — boot fresh nodes for interactive testing.
#
#   docker compose -f dev/docker-compose.yml up --build
#
# Then onboard each node through the web UI:
#   - Node 1 (leader): http://localhost:8120
#   - Node 2 (worker): http://localhost:8122
#   - Node 3 (worker): http://localhost:8124
#
# All nodes start unconfigured — pick a mode during onboarding.
# To test approval: onboard node1 as leader, node2/node3 as workers,
# then approve them from node1's settings page.
services:
  node1:
    build: ..
    init: true
    ports:
      - "127.0.0.1:8120:8120"
      - "127.0.0.1:8121:8121"
    volumes:
      - node1:/hiro

  node2:
    build: ..
    init: true
    ports:
      - "127.0.0.1:8122:8120"
    volumes:
      - node2:/hiro

  node3:
    build: ..
    init: true
    ports:
      - "127.0.0.1:8124:8120"
    volumes:
      - node3:/hiro

volumes:
  node1:
  node2:
  node3:

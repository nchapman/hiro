# Cluster e2e test — run with: make test-cluster (not directly)
# The Makefile creates tests/e2e_cluster/leader-config/config.yaml before use.
# Starts a leader and worker node, verifies clustering end-to-end.
services:
  leader:
    build: ..
    init: true
    ports:
      - "0:8120"  # HTTP API (random host port)
      - "0:8121"  # Cluster gRPC (random host port)
    volumes:
      - leader-hiro:/hiro
      - ../tests/e2e_cluster/leader-config:/hiro/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8120/api/health"]
      interval: 5s
      timeout: 3s
      start_period: 5s

  worker:
    build: ..
    init: true
    depends_on:
      leader:
        condition: service_healthy
    environment:
      - HIRO_MODE=worker
      - HIRO_LEADER=leader:8121
    volumes:
      - worker-hiro:/hiro

volumes:
  leader-hiro:
  worker-hiro:

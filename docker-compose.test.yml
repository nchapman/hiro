# Unified test runner — matches production security settings.
# Used by: make test, make test-isolation, make test-netiso, make check
services:
  test:
    build:
      context: .
      target: test
    init: true
    cap_add:
      - NET_ADMIN  # nftables rules, veth pairs
    security_opt:
      - seccomp=seccomp.json  # allow CLONE_NEWUSER (Docker default blocks it)
    sysctls:
      - net.ipv4.ip_forward=1
    command: ["go", "test", "-race", "./...", "-v", "-count=1"]

# Network isolation integration tests — run with: make test-netiso
# Uses the EXACT same privileges as production (no --privileged).
services:
  test:
    build:
      context: .
      target: test
    init: true
    cap_add:
      - NET_ADMIN  # nftables rules, veth pairs
      - SYS_ADMIN  # CLONE_NEWNET, CLONE_NEWNS for per-agent namespaces
    sysctls:
      - net.ipv4.ip_forward=1
    command: ["go", "test", "./internal/netiso/...", "-tags=netiso", "-v", "-count=1"]

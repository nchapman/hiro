# E2E test overlay — run with: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up hiro-e2e
services:
  hiro-e2e:
    build: .
    cap_add:
      - NET_ADMIN
    ports:
      - "0:8080" # random host port to avoid conflicts
    environment:
      - HIRO_ADDR=:8080
      - HIRO_ROOT=/hiro
    volumes:
      - e2e-hiro:/hiro
    init: true # clean up zombie agent processes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s

volumes:
  e2e-hiro:

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        # Strip leading 'v' so --version prints "hiro 2026.04.08"
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/nchapman/hiro
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/nchapman/hiro
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bundle release assets
        run: |
          mkdir -p release
          cp docker-compose.yml seccomp.json release/
          # Tarball contains only the deployment files, not SHA256SUMS
          tar czf hiro-${{ github.ref_name }}.tar.gz -C release docker-compose.yml seccomp.json
          # SHA256SUMS covers both individual files and the tarball
          (cd release && sha256sum docker-compose.yml seccomp.json) > release/SHA256SUMS
          sha256sum hiro-${{ github.ref_name }}.tar.gz >> release/SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            hiro-${{ github.ref_name }}.tar.gz
            release/SHA256SUMS
          generate_release_notes: true
